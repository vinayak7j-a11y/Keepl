<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Keepl Shop Login</title>

<link rel="stylesheet" href="/style.css">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2f80ed">

<style>
.subtitle{
  text-align:center;
  color:#666;
  font-size:14px;
  margin-bottom:20px;
}

.error{
  color:#e74c3c;
  font-size:14px;
  text-align:center;
  margin-top:10px;
}

.register{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.installBtn{
  margin-top:10px;
  width:100%;
  background:#27ae60;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const token = localStorage.getItem("token");
  const shopId = localStorage.getItem("shopId");

  if(token && shopId){
    window.location.href="/dashboard/"+shopId;
  }
});
</script>

</head>

<body>

<div class="login-card">

<h2>Keepl Shop Login</h2>

<p class="subtitle">
Access your shop rewards dashboard
</p>

<!-- ✅ CLEAN FORM -->
<form id="loginForm">

  <input 
    id="phone"
    type="tel"
    placeholder="Shop Owner Phone Number"
    required
  />

  <input 
    id="password"
    type="password"
    placeholder="Password"
    required
  />

  <button id="loginBtn" type="submit">Login</button>

</form>

<p id="errorMsg" class="error"></p>

<button id="installBtn" class="installBtn" style="display:none;">
Install Keepl App
</button>

<p class="register">
Don't have a shop account?
<a href="/register.html">Register Shop</a>
</p>

</div>

<!-- ✅ LOGIN SCRIPT -->
<script>
const BASE_URL = "https://keepl.onrender.com";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorMsg = document.getElementById("errorMsg");
  const btn = document.getElementById("loginBtn");

  errorMsg.innerText = "";

  if (!phone || !password) {
    errorMsg.innerText = "Please enter phone and password";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Logging in...";

  try {
    const res = await fetch(`${BASE_URL}/api/shops/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone, password })
    });

    const data = await res.json();

    if (res.ok && data.shopId) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("shopId", data.shopId);

      window.location.href = "/dashboard/" + data.shopId;
    } else {
      errorMsg.innerText = data.message || "Login failed";
    }

  } catch (err) {
    errorMsg.innerText = "Server error. Please try again.";
  }

  btn.disabled = false;
  btn.innerText = "Login";
});
</script>

<!-- PWA -->
<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.getElementById("installBtn");
  btn.style.display="block";

  btn.onclick = async () => {
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    if(choice.outcome==="accepted"){
      btn.style.display="none";
    }
  };
});
</script>

</body>
</html>
